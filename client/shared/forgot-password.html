<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | SASF LAW FIRM</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth-page-body">
  <main class="auth-page-shell">
    <section class="auth-page-card">
      <a class="auth-back-link" href="/login">Back to login</a>

      <div class="registration-header-bar" style="margin-top: 20px; background-color: #f0f7ff; color: #1e40af; border-color: #dbeafe;">Reset Password</div>

      <p class="auth-page-text" style="margin-bottom: 25px;">Set a new password for your account.</p>

      <form id="forgotPasswordForm" class="branded-registration-form">
        <div class="form-row-full">
          <label><span>Email Address</span><input type="email" name="email" placeholder="Enter your email" required></label>
        </div>
        <div class="form-row-full">
          <label><span>New Password</span><input type="password" name="password" placeholder="Create new password" required></label>
        </div>
        <div class="form-row-full">
          <label><span>Confirm Password</span><input type="password" name="confirmPassword" placeholder="Confirm new password" required></label>
        </div>
        <button class="primary-btn branded-submit-btn" type="submit">Update Password</button>
      </form>

      <p class="auth-feedback" id="authFeedback" aria-live="polite"></p>
    </section>
  </main>

  <script src="/auth.js"></script>
</body>
</html>
