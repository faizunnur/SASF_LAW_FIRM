<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | SASF LAW FIRM</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page-body">
  <main class="auth-page-shell">
    <section class="auth-page-card auth-page-card-wide">
      <a class="auth-back-link" href="index.html">Back to dashboard</a>
      <p class="section-kicker">Create Account</p>
      <h1 class="register-title">Register for SASF Law Firm</h1>
      <p class="auth-page-text">Create a client account and continue into the management dashboard.</p>

      <form id="registerPageForm" class="form-grid form-grid-two auth-page-form">
        <label><span>Full Name</span><input type="text" name="name" placeholder="Full name" required></label>
        <label><span>Email</span><input type="email" name="email" placeholder="Email address" required></label>
        <label><span>Password</span><input type="password" name="password" placeholder="Create password" required></label>
        <label><span>Role</span><input type="text" name="roleLabel" value="Client" readonly></label>
        <label><span>Phone</span><input type="text" name="phone" placeholder="Phone number" required></label>
        <label><span>Occupation</span><input type="text" name="department" placeholder="Student, Business Owner, Engineer..." required></label>
        <button class="primary-btn full-span" type="submit">Create Account</button>
      </form>

      <p class="auth-feedback" id="authFeedback" aria-live="polite"></p>
      <p class="auth-page-switch">Already registered? <a href="login.html">Go to login</a>.</p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
