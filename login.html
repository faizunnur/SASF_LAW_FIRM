<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SASF LAW FIRM</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page-body">
  <main class="auth-page-shell">
    <section class="auth-page-card">
      <a class="auth-back-link" href="index.html">Back to dashboard</a>
      <p class="section-kicker">Access Portal</p>
      <h1>Log in to SASF Law Firm</h1>
      <p class="auth-page-text">Client accounts can sign in here to track cases, appointments, documents, and notifications.</p>

      <form id="loginPageForm" class="form-grid auth-page-form">
        <label><span>Email</span><input type="email" name="email" placeholder="Enter your email" required></label>
        <label><span>Password</span><input type="password" name="password" placeholder="Enter your password" required></label>
        <button class="primary-btn" type="submit">Log In</button>
      </form>

      <p class="auth-feedback" id="authFeedback" aria-live="polite"></p>
      <p class="auth-page-switch">Need an account? <a href="register.html">Create one here</a>.</p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
